services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketr
      POSTGRES_PASSWORD: ticketr
      POSTGRES_DB: ticketr
    volumes:
      - ticketr_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketr -d ticketr"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ticketr:ticketr@postgres:5432/ticketr
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production-use-openssl-rand-base64-32}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SEED_DATABASE: ${SEED_DATABASE:-true}
      TICKETR_NAME: ${TICKETR_NAME:-ticketr}
      ZEPTO_API_KEY: ${ZEPTO_API_KEY:-}
      ZEPTO_FROM_ADDRESS: ${ZEPTO_FROM_ADDRESS:-}
      ZEPTO_FROM_NAME: ${ZEPTO_FROM_NAME:-ticketr}
      ZEPTO_API_URL: ${ZEPTO_API_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED:-false}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXT_PUBLIC_GITHUB_OAUTH_ENABLED: ${NEXT_PUBLIC_GITHUB_OAUTH_ENABLED:-false}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_KEY_PREFIX: ${R2_KEY_PREFIX:-ticketr/attachments}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ticketr_pg_data:
